<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; min-height: 100vh; }
        .main-card { border-radius: 24px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.08); background: white; padding: 2rem; }
        .header-icon { width: 60px; height: 60px; background-color: #f3f4f6; color: #374151; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem; }
        .tx-item { border-radius: 16px; background: #fff; border: 1px solid #f1f5f9; transition: all 0.2s; padding: 1.25rem; display: flex; align-items: center; gap: 15px; }
        .tx-item:hover { background-color: #f8fafc; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transform: translateY(-2px); }
        .tx-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .icon-pos { background-color: #d1fae5; color: #059669; }
        .icon-neg { background-color: #fee2e2; color: #e11d48; }
        .text-pos { color: #059669; }
        .text-neg { color: #e11d48; }
        .custom-select { border-radius: 12px; background-color: #f8fafc; border-color: #e2e8f0; font-weight: 600; color: #475569; }
        .custom-select:focus { box-shadow: none; border-color: #cbd5e1; }
    </style>
</head>
<body class="d-flex align-items-center py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="main-card position-relative">
                    <a href="menu.html" class="position-absolute top-0 start-0 mt-4 ms-4 text-secondary fs-4"><i class="bi bi-arrow-left"></i></a>
                    
                    <div class="text-center mb-4 mt-2">
                        <div class="header-icon"><i class="bi bi-clock-history"></i></div>
                        <h3 class="fw-bold">Historial</h3>
                    </div>
                    
                    <div class="mb-4">
                        <select id="filtroTipo" class="form-select form-select-lg custom-select">
                            <option value="todos">Todos los movimientos</option>
                            <option value="deposito">Entradas (Depósitos)</option>
                            <option value="transferencia">Salidas (Transferencias)</option>
                        </select>
                    </div>

                    <div id="listaMovimientos" class="d-flex flex-column gap-3 mb-4"></div>

                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            const transaccionesGuardadas = JSON.parse(localStorage.getItem('transactions') || '[]');

            function getIconHtml(tipo, monto) {
                if (monto > 0) {
                    return `<div class="tx-icon icon-pos"><i class="bi bi-arrow-down-left"></i></div>`;
                } else {
                    return `<div class="tx-icon icon-neg"><i class="bi bi-arrow-up-right"></i></div>`;
                }
            }

            function mostrarUltimosMovimientos(filtro) {
                const contenedor = $('#listaMovimientos');
                contenedor.empty();

                const filtrados = filtro === 'todos' 
                    ? transaccionesGuardadas 
                    : transaccionesGuardadas.filter(t => t.tipo === filtro);

                if (filtrados.length === 0) {
                    contenedor.append('<div class="text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-3 opacity-50"></i><span class="fw-semibold">No hay movimientos para mostrar.</span></div>');
                    return;
                }

                filtrados.forEach(function(tx) {
                    const esPositivo = tx.monto > 0;
                    const colorClase = esPositivo ? 'text-pos' : 'text-neg';
                    const signo = esPositivo ? '+' : '';
                    const badgeBg = tx.tipo === 'deposito' ? 'bg-success' : 'bg-danger';
                    const badgeText = tx.tipo === 'deposito' ? 'Ingreso' : 'Envío';
                    
                    const html = `
                        <div class="tx-item">
                            ${getIconHtml(tx.tipo, tx.monto)}
                            <div class="flex-grow-1">
                                <h6 class="mb-1 fw-bold text-dark lh-1">${tx.detalle}</h6>
                                <div class="d-flex align-items-center mt-1">
                                    <small class="text-secondary opacity-75">${tx.fecha}</small>
                                    <span class="badge ${badgeBg} bg-opacity-10 text-dark border px-2 py-0 ms-2 rounded-pill shadow-none" style="font-size: 0.65rem;">${badgeText}</span>
                                </div>
                            </div>
                            <div class="text-end">
                                <h5 class="mb-0 fw-bold ${colorClase}">${signo}$${Math.abs(tx.monto).toLocaleString('es-CL')}</h5>
                            </div>
                        </div>
                    `;
                    contenedor.append(html);
                });
            }

            $('#filtroTipo').change(function() {
                mostrarUltimosMovimientos($(this).val());
            });

            mostrarUltimosMovimientos('todos');
        });
    </script>
</body>
</html>
