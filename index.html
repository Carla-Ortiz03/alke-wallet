<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; margin: 0; height: 100vh; }
        .hero-section { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 3rem; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .btn-custom { background: linear-gradient(45deg, #00c6ff, #0072ff); border: none; color: white; transition: transform 0.3s, box-shadow 0.3s; }
        .btn-custom:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4); color: white; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="glass-card">
            <i class="bi bi-wallet2 display-1 mb-3 text-info"></i>
            <h1 class="display-4 fw-bold mb-3">Alke Wallet</h1>
            <p class="lead mb-5">El futuro de tus finanzas, en la palma de tu mano.</p>
            <a href="login.html" class="btn btn-custom btn-lg px-5 py-3 rounded-pill fw-bold">Comenzar ahora <i class="bi bi-arrow-right ms-2"></i></a>
        </div>
    </div>
</body>
</html>
