<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .login-card { border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: white; overflow: hidden; }
        .card-header-custom { background: linear-gradient(45deg, #1e3c72, #2a5298); color: white; padding: 2rem 0; text-align: center; }
        .btn-primary { background: linear-gradient(45deg, #1e3c72, #2a5298); border: none; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(30, 60, 114, 0.3); }
        .input-group-text { background: transparent; border-right: none; color: #1e3c72; }
        .form-control { border-left: none; }
        .form-control:focus { box-shadow: none; border-color: #dee2e6; }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="login-card">
                    <div class="card-header-custom">
                        <i class="bi bi-person-circle display-4"></i>
                        <h3 class="mt-2 fw-bold">Bienvenido</h3>
                    </div>
                    <div class="p-4 p-md-5">
                        <div id="alert-container"></div>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="form-label text-muted fw-semibold">Correo Electrónico</label>
                                <div class="input-group input-group-lg border rounded-3">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-5">
                                <label class="form-label text-muted fw-semibold">Contraseña</label>
                                <div class="input-group input-group-lg border rounded-3">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="password" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-3 fs-5 rounded-pill fw-bold">Iniciar Sesión</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            $('#loginForm').submit(function(e) {
                e.preventDefault();
                const email = $('#email').val();
                const password = $('#password').val();

                if (email === 'usuario@correo.com' && password === '123456') {
                    $('#alert-container').html('<div class="alert alert-success rounded-3 text-center fw-bold"><i class="bi bi-check-circle me-2"></i>¡Acceso concedido!</div>');
                    setTimeout(function() {
                        window.location.href = 'menu.html';
                    }, 1500);
                } else {
                    $('#alert-container').html('<div class="alert alert-danger rounded-3 text-center fw-bold"><i class="bi bi-exclamation-circle me-2"></i>Credenciales incorrectas.</div>');
                }
            });
        });
    </script>
</body>
</html>
