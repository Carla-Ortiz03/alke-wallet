<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; min-height: 100vh; }
        .main-card { border-radius: 24px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.08); background: white; padding: 2.5rem; }
        .header-icon { width: 60px; height: 60px; background-color: #e0f2fe; color: #0284c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem; }
        .amount-input { font-size: 2.5rem !important; font-weight: 700; text-align: center; color: #0f2027; border: none; box-shadow: none !important; }
        .input-wrapper { border-bottom: 2px solid #e2e8f0; margin-bottom: 2rem; transition: border-color 0.3s; }
        .input-wrapper:focus-within { border-bottom-color: #0284c7; }
        .btn-success { background: linear-gradient(45deg, #10b981, #059669); border: none; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="d-flex align-items-center py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="main-card position-relative">
                    <a href="menu.html" class="position-absolute top-0 start-0 mt-4 ms-4 text-secondary fs-4"><i class="bi bi-arrow-left"></i></a>
                    
                    <div class="text-center mb-4 mt-2">
                        <div class="header-icon"><i class="bi bi-cash-stack"></i></div>
                        <h3 class="fw-bold">Depositar Fondos</h3>
                        <p class="text-secondary fw-medium" id="saldo-actual-display"></p>
                    </div>
                    
                    <div id="alert-container"></div>

                    <form id="formDeposito">
                        <div class="input-wrapper d-flex align-items-center justify-content-center pb-2">
                            <span class="fs-2 fw-bold text-secondary">$</span>
                            <input type="number" id="montoDeposito" class="form-control amount-input bg-transparent w-75 p-0" min="1" placeholder="0" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold fs-5 mb-3 shadow-sm">Confirmar Depósito</button>
                        <div class="text-center">
                            <h4 id="leyenda-monto" class="text-success fw-bold d-none m-0 animate__animated animate__fadeInUp"></h4>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            let balance = parseFloat(localStorage.getItem('balance') || 0);
            $('#saldo-actual-display').html(`Saldo actual: <span class="text-dark fw-bold">$${balance.toLocaleString('es-CL')}</span>`);

            $('#formDeposito').submit(function(e) {
                e.preventDefault();
                const amount = parseFloat($('#montoDeposito').val());
                
                balance += amount;
                localStorage.setItem('balance', balance);

                let txs = JSON.parse(localStorage.getItem('transactions') || '[]');
                txs.unshift({
                    tipo: 'deposito',
                    detalle: 'Ingreso de dinero',
                    fecha: new Date().toLocaleDateString('es-CL'),
                    monto: amount
                });
                localStorage.setItem('transactions', JSON.stringify(txs));

                $('#alert-container').html('<div class="alert alert-success border-0 rounded-3 text-center fw-bold"><i class="bi bi-check-circle-fill me-2"></i>Depósito realizado</div>');
                $('#leyenda-monto').text(`+ $${amount.toLocaleString('es-CL')}`).removeClass('d-none');
                
                $('button[type="submit"]').prop('disabled', true);

                setTimeout(function() {
                    window.location.href = 'menu.html';
                }, 2000);
            });
        });
    </script>
</body>
</html>
